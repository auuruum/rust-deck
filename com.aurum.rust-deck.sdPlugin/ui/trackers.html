<!DOCTYPE html>
<html>
<head>
    <title>Trackers Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
    <script src="global-settings.js" defer></script>
    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body>
    <sdpi-item label="Base URL">
        <sdpi-textfield setting="baseUrl" global placeholder="Enter guild URL (e.g. http://localhost:8074/113...)"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="API Password">
        <sdpi-textfield setting="apiPassword" global placeholder="Enter this guild API password" type="password"></sdpi-textfield>
    </sdpi-item>

</body>
</html>
